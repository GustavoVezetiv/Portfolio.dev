<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vezetiv - Dashboard</title>
    <!-- Tela protegida (exige acesso via D20): não indexar para não gerar páginas vazias no Google. -->
    <meta name="robots" content="noindex, follow">
    <meta name="description" content="Painel interativo do portfólio de Gustavo Vezetiv.">
    <link rel="canonical" href="https://vezetiv.dev/">
    <meta property="og:image" content="https://vezetiv.dev/img/Group%20266.svg">

    <link rel="stylesheet" href="css/tailwind.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Inter:wght@300;400;600&family=Fira+Code:wght@400;600&display=swap"
        rel="stylesheet">

    <link rel="icon" href="img/Group 266.svg">

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-[#0b1020] h-screen w-full overflow-hidden text-white select-none">

    <!-- Fundo animado: morphing gradient ciano, azul e violeta -->
    <div class="animated-bg"></div>

    <main class="w-full h-full relative z-10">

        <section class="page-section h-full w-full flex flex-col items-center justify-center font-inter bg-transparent relative">

            <div id="v3-hero"
                class="flex-1 flex flex-col justify-center items-center mb-24 animate-fadeIn transition-all duration-500 relative w-full">
                <!-- Botão Voltar no topo direito -->
                <button onclick="goBackToIndex()" class="absolute top-8 right-8 w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 border border-white/20 flex items-center justify-center text-white transition-all hover:scale-110 group">
                    <i class="fas fa-arrow-left text-sm"></i>
                    <span class="absolute -bottom-8 right-0 bg-black/80 text-white px-2 py-1 rounded text-xs opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Voltar</span>
                </button>

                <h1
                    class="font-montserrat font-black text-main text-[clamp(3rem,10vw,8rem)] leading-[0.9] uppercase tracking-tighter">
                    GUSTAVO</h1>
                <p class="font-inter text-xs sm:text-lg md:text-xl tracking-[2px] sm:tracking-[4px] text-white/90 mt-4 uppercase drop-shadow-md whitespace-nowrap">Full Stack Developer</p>
                <div class="mt-2 flex gap-2">
                    <span class="px-2 py-1 bg-white/10 rounded text-[10px] uppercase tracking-widest border border-white/20">Lv. 21</span>
                    <span class="px-2 py-1 bg-white/10 rounded text-[10px] uppercase tracking-widest border border-white/20">Cuiabá-MT</span>
                </div>

                <!-- Redes Sociais (renderizadas a partir de js/data/perfil.js) -->
                <div id="hero-sociais" class="flex gap-3 mt-6"></div>
            </div>

            <div id="v3-app-window" class="hidden absolute inset-0 z-40 flex items-center justify-center p-2 sm:p-4 md:p-10 backdrop-blur-md bg-black/40 app-window pointer-events-none" onclick="handleBackdropClick(event)">
                <div id="v3-app-content"
                    class="w-full h-full sm:max-h-[75vh] md:h-full max-w-sm sm:max-w-2xl md:max-w-4xl lg:max-w-6xl bg-[#0f1014] rounded-3xl border border-white/10 shadow-2xl overflow-hidden relative flex flex-col" onclick="event.stopPropagation()">
                    <div class="h-12 bg-white/5 border-b border-white/5 flex items-center px-4 justify-between shrink-0">
                        <div class="flex gap-2">
                            <div onclick="goBack()" class="w-3 h-3 rounded-full bg-red-500 hover:bg-red-400 cursor-pointer transition-colors"></div>
                            <div onclick="closeApp()" class="w-3 h-3 rounded-full bg-yellow-500 hover:bg-yellow-400 cursor-pointer transition-colors"></div>
                            <div onclick="closeApp()" class="w-3 h-3 rounded-full bg-green-500 hover:bg-green-400 cursor-pointer transition-colors"></div>
                        </div>
                        <span id="v3-app-title" class="text-xs font-bold text-white/50 uppercase tracking-widest">Perfect Interface</span>
                        <div class="w-10"></div>
                    </div>
                    <div id="v3-app-body" class="flex-1 overflow-y-auto overflow-x-hidden p-6 relative">
                        <!-- Conteúdo renderizado por js/apps.js -->
                    </div>
                    <p class="modal-close-hint shrink-0 border-t border-white/5 px-4 py-2 text-center text-[10px] uppercase tracking-[2px] text-white/35">
                        Clique fora da janela para sair
                    </p>
                </div>
            </div>

            <div id="source-dock" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 w-auto max-w-[95vw] mb-2">
                <div class="dock-container flex items-end gap-3 p-3 bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl shadow-2xl">

                    <div onclick="loadApp('certificados')"
                        class="dock-item group relative w-12 h-12 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex justify-center items-center text-white text-2xl border border-white/20 cursor-pointer shadow-lg">
                        <i class="fas fa-certificate"></i>
                        <span class="absolute -top-12 left-1/2 -translate-x-1/2 bg-black/80 text-white px-2 py-1 rounded text-xs opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap">Certificados</span>
                    </div>

                    <div onclick="loadApp('projetos')"
                        class="dock-item group relative w-12 h-12 bg-gradient-to-br from-orange-500 to-red-600 rounded-xl flex justify-center items-center text-white text-2xl border border-white/20 cursor-pointer shadow-lg">
                        <i class="fas fa-code"></i>
                        <span class="absolute -top-12 left-1/2 -translate-x-1/2 bg-black/80 text-white px-2 py-1 rounded text-xs opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap">Projetos</span>
                    </div>

                    <div onclick="loadApp('curriculo')"
                        class="dock-item group relative w-12 h-12 bg-white/10 rounded-xl flex justify-center items-center text-white/90 text-2xl border border-white/5 cursor-pointer shadow-lg">
                        <i class="far fa-file-pdf"></i>
                        <span class="absolute -top-12 left-1/2 -translate-x-1/2 bg-black/80 text-white px-2 py-1 rounded text-xs opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap">Currículo</span>
                    </div>

                    <div onclick="loadApp('dossie')"
                        class="dock-item group relative w-12 h-12 bg-white/10 rounded-xl flex justify-center items-center text-white/90 text-2xl border border-white/5 cursor-pointer shadow-lg">
                        <i class="fas fa-scroll"></i>
                        <span class="absolute -top-12 left-1/2 -translate-x-1/2 bg-black/80 text-white px-2 py-1 rounded text-xs opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap">Dossiê</span>
                    </div>

                    <div class="w-[1px] h-8 bg-white/20 mx-1 self-center"></div>

                    <div onclick="loadApp('sobre')"
                        class="dock-item group relative w-12 h-12 bg-white/10 rounded-xl flex justify-center items-center text-white/90 text-2xl border border-white/5 cursor-pointer shadow-lg">
                        <i class="far fa-user"></i>
                        <span class="absolute -top-12 left-1/2 -translate-x-1/2 bg-black/80 text-white px-2 py-1 rounded text-xs opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap">Sobre Mim</span>
                    </div>

                    <div onclick="loadApp('servicos')"
                        class="dock-item group relative w-12 h-12 bg-white/10 rounded-xl flex justify-center items-center text-white/90 text-2xl border border-white/5 cursor-pointer shadow-lg">
                        <i class="fas fa-briefcase"></i>
                        <span class="absolute -top-12 left-1/2 -translate-x-1/2 bg-black/80 text-white px-2 py-1 rounded text-xs opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap">Serviços</span>
                    </div>

                    <div onclick="loadApp('contato')"
                        class="dock-item group relative w-12 h-12 bg-gradient-to-br from-cyan-500 to-emerald-600 rounded-xl flex justify-center items-center text-white text-2xl border border-white/20 cursor-pointer shadow-lg">
                        <i class="fas fa-paper-plane"></i>
                        <span class="absolute -top-12 left-1/2 -translate-x-1/2 bg-black/80 text-white px-2 py-1 rounded text-xs opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap">Contato</span>
                    </div>

                </div>
            </div>
        </section>

        <!-- Modal de Detalhes de Certificação -->
        <div id="cert-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4 backdrop-blur-sm bg-black/60 pointer-events-none" onclick="closeCertModal(event)">
            <div class="bg-[#0f1014] rounded-2xl border border-white/10 max-w-md w-full p-6 relative pointer-events-auto" onclick="event.stopPropagation()">
                <button onclick="closeCertModal()" class="absolute top-3 right-3 text-white/60 hover:text-white text-2xl">
                    <i class="fas fa-times"></i>
                </button>
                <div id="cert-modal-content" class="space-y-4">
                    <!-- Conteúdo preenchido por openCertModal() -->
                </div>
                <p class="modal-close-hint mt-5 border-t border-white/5 pt-3 text-center text-[10px] uppercase tracking-[2px] text-white/35">
                    Clique fora para sair
                </p>
            </div>
        </div>

    </main>

    <script>
        // ===== GUARDA DE ACESSO =====
        // Só entra no dashboard quem rolou o D20 com sucesso (token na sessão).
        if (!sessionStorage.getItem('acessoPermitido')) {
            window.location.href = "index.html";
        }
        // Obs.: o botão "Voltar" do navegador funciona normalmente.
        // Para reiniciar a experiência (rolar o D20 de novo), use o botão de voltar do hero (goBackToIndex).
    </script>

    <!-- Dados (fonte única de verdade) -->
    <script src="js/data/perfil.js"></script>
    <script src="js/data/certificados.js"></script>
    <script src="js/data/projetos.js"></script>
    <script src="js/data/servicos.js"></script>
    <script src="js/data/dossie.js"></script>
    <!-- Utilitários compartilhados + controlador dos apps -->
    <script src="js/ui.js"></script>
    <script src="js/apps.js"></script>
</body>

</html>
